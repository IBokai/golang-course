services:
  collector:
    build:
      context: .
      dockerfile: services/collector/Dockerfile
    environment:
      - GRPC_ADDR=:50051
    ports:
      - "50051:50051"
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      - HTTP_ADDR=:8080
      - COLLECTOR_ADDR=collector:50051
    ports:
      - "8080:8080"
    depends_on:
      - collector